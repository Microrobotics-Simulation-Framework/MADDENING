name: Slow tests (scheduled)

# Runs the @slow-marked tests three times a week.  The default CI lane
# excludes them (per pyproject.toml's ``addopts = "-m 'not slow'"``);
# this workflow opts in with ``-m 'slow or not slow'``.
#
# Notification model:
#   * GitHub emails the workflow author on any scheduled-run failure
#     -- including timeouts (a timed-out job is a failed job).  Silent
#     on success.
#   * On a *timeout* or an *out-of-memory* kill specifically, we ALSO
#     open a tracking issue via the built-in GITHUB_TOKEN.  GitHub then
#     emails repo watchers with a body that names the failure mode and
#     suggests the right fix (investigate/bump the timeout, or shrink
#     the offending test's memory footprint).  This is the only way to
#     get a failure-mode-specific email body (the default failure email
#     is just "Run failed").  Without it an OOM-killed run comes back as
#     a bare exit 137 and the notifier stays silent -- which is exactly
#     the opaque "operation was canceled" failure this guards against.

on:
  schedule:
    # Mon / Wed / Fri at 16:00 UTC  (~18:00 CEST / 17:00 CET).
    # Cron is UTC only, no DST adjustment.
    - cron: '0 16 * * 1,3,5'
  workflow_dispatch:       # also runnable on demand from the Actions tab

jobs:
  slow:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      issues: write        # required for the timeout-issue creation step
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Match the CI lane's pinned JAX.
          pip install "jax==0.5.1" "jaxlib==0.5.1"
          pip install -e ".[ci]"

      - name: Run full suite (slow lane)
        id: pytest
        continue-on-error: true
        env:
          JAX_PLATFORMS: cpu
          XLA_FLAGS: "--xla_gpu_autotune_level=0"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          # Wrap pytest with GNU ``timeout`` so we exit with code 124
          # on time-out (instead of GitHub killing the job with a
          # generic SIGTERM).  175m gives 5 minutes of headroom under
          # the job-level ``timeout-minutes: 180``, leaving room for
          # the follow-up issue-creation step to finish.
          #
          # ``--kill-after=60s`` escalates to SIGKILL if a test ignores
          # the expiry SIGTERM (e.g. a long native XLA call), so a hang
          # can't fall through to the job-level cap and produce an
          # opaque "operation was canceled" teardown.  We also record
          # elapsed wall-time: an exit 137 (SIGKILL) at/after the 175m
          # mark is a timeout-kill, whereas an earlier 137 is the Linux
          # OOM-killer (memory) -- the classifier below uses this to
          # tell the two apart.
          set +e
          start=$SECONDS
          timeout --kill-after=60s 175m python -m pytest tests/ \
              -m 'slow or not slow' -v --tb=short --ignore=tests/viz
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "elapsed_sec=$(( SECONDS - start ))" >> "$GITHUB_OUTPUT"

      - name: Classify failure and open tracking issue
        if: steps.pytest.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const code = '${{ steps.pytest.outputs.exit_code }}';
            const elapsed = Number('${{ steps.pytest.outputs.elapsed_sec }}');
            const py = '${{ matrix.python-version }}';
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Disambiguate the failure mode from the exit code:
            //   124          -> inner `timeout` fired, SIGTERM honoured.
            //   137 (SIGKILL) -> ambiguous: the Linux OOM-killer (memory)
            //                    OR `timeout`'s --kill-after escalation on
            //                    a SIGTERM-ignoring hang.  Split by elapsed
            //                    wall-time: a kill at/after the 175m mark is
            //                    a timeout; an earlier kill is OOM.
            //   134 (SIGABRT) -> typically C++ std::bad_alloc, i.e. OOM.
            // Anything else is an ordinary pytest failure -> no issue, just
            // the default "Run failed" email + the re-raise step below.
            const TIMEOUT_SEC = 175 * 60;
            const isTimeout = code === '124' || (code === '137' && elapsed >= TIMEOUT_SEC);
            const isOom = code === '134' || (code === '137' && elapsed < TIMEOUT_SEC);

            let title, body;
            if (isTimeout) {
              title = `slow-tests: timeout on Python ${py} @ ${sha}`;
              body = [
                `The scheduled slow-tests workflow hit the 175-minute wrapper timeout`,
                `(the job-level \`timeout-minutes\` is 180; the inner \`timeout 175m\`,`,
                `wrapping pytest, fires first so we can distinguish timeout from other`,
                `failures).`,
                ``,
                `Action — either:`,
                ``,
                `1. **Investigate which slow test is running long.** The run log shows`,
                `   the last test pytest reported before the timeout fired.`,
                `2. **Bump the timeout.** Edit \`.github/workflows/slow-tests.yml\` and`,
                `   raise both \`timeout-minutes\` (currently 180) and the inner`,
                `   \`timeout 175m\` (keep ~5 min headroom between them).`,
              ];
            } else if (isOom) {
              title = `slow-tests: out-of-memory on Python ${py} @ ${sha}`;
              body = [
                `The scheduled slow-tests workflow was killed by the OS while running`,
                `pytest (exit ${code}${code === '137' ? ', SIGKILL — the Linux OOM-killer signature' : ', SIGABRT — typically C++ std::bad_alloc'}; killed after ${Math.round(elapsed / 60)} min,`,
                `well under the 175-minute timeout, so this is a *memory* failure, not a`,
                `slow test).  A test's working set exceeded the ~7 GB \`ubuntu-latest\``,
                `runner — most likely an XLA backward-compile graph.`,
                ``,
                `Action — either:`,
                ``,
                `1. **Shrink the offending test's footprint.** The run log shows the last`,
                `   test pytest reported before the kill; reduce its problem size (e.g.`,
                `   the chain length \`N\`) until peak RSS fits the runner.`,
                `2. **Move it to a larger runner** if the scale is essential.`,
              ];
            } else {
              core.info(`pytest exit ${code} is an ordinary failure; no tracking issue opened.`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [...body, ``, `Workflow run: ${runUrl}`].join('\n'),
            });

      - name: Re-raise pytest failure
        if: steps.pytest.outputs.exit_code != '0'
        run: |
          echo "pytest exited with code ${{ steps.pytest.outputs.exit_code }}"
          exit 1
