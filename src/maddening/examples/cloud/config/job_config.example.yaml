version: 1

provider: runpod   # Must match a block in cloud_credentials.yaml

# gpu_type: Provider-specific SkyPilot accelerator name.
# NOT portable across providers.
# Run `sky show-gpus --cloud <provider> --all` to see available options.
#
# RunPod:      RTXA4000 ($0.20 spot), A40 ($0.20 spot), RTX4090, L4, A100-80GB
# Lambda Labs: A100-80GB, H100-SXM, A10  (STUB — not validated end-to-end)
gpu_type: "RTXA4000"
gpu_count: 1
use_spot: true
region: ""    # Empty = cheapest available. RunPod uses country codes: NL, SE, US, CZ, etc.
disk_size: 50

cost:
  max_cost_per_hour: 2.00
  max_total_budget: 5.00   # SkyPilot local estimate only — NOT real-time billing.
                           # Tracks spend on this machine via local cache.
                           # Does not reflect spend from other machines or
                           # clusters managed outside SkyPilot.
  autostop_minutes: 15
  auto_teardown: true
  spot_fallback: true   # If spot is unavailable, automatically retry on-demand

# Default: MADDENING pre-built image with JAX CUDA, GStreamer, ZMQ, FastAPI
# Override only if you need a custom base image
container_image: "ghcr.io/microrobotics-simulation-framework/maddening-cloud:latest"
stream_preset: "standard"
